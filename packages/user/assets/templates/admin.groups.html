<% TITLE = `${CTX.app.name} - ${$t("tymber.user.groups")}`; %>

<nav class="breadcrumb" aria-label="breadcrumbs">
  <ul>
    <li>
      <a href="/admin" aria-current="page"><%= $t("tymber.common.home") %></a>
    </li>
    <li class="is-active">
      <a href="#" aria-current="page"><%= $t("tymber.user.groups") %></a>
    </li>
  </ul>
</nav>

<h1 class="title is-spaced"><%= $t("tymber.user.groups") %></h1>

<div id="app"></div>

<script type="module">
  import { createApp } from "vue";
  import {
    doFetch,
    DataTable,
    LazyInput,
    snakeToCamelCase,
    camelToSnakeCase,
    Toast,
  } from "./utils";

  const GroupTable = {
    components: {
      DataTable,
      LazyInput,
    },

    data() {
      return {
        headers: [
          {
            text: "<%= $t('tymber.user.label') %>",
            value: "label",
            isSortable: true,
          },
          {
            text: "",
            value: "actions",
          },
        ],
        isLoading: false,
        shouldRerun: false,
        searchText: "",
        items: [],
        options: {
          sortBy: "label",
          sortDesc: false,
        },
      };
    },

    methods: {
      readQueryParams() {
        const query = new URLSearchParams(window.location.search);
        this.searchText = query.get("q") || "";
        const sort = query.get("s");

        if (sort) {
          const parts = sort.split("|");
          const column = snakeToCamelCase(parts[0]);
          if (
            this.headers.some((h) => h.value === column) &&
            ["asc", "desc"].includes(parts[1])
          ) {
            this.options.sortBy = column;
            this.options.sortDesc = parts[1] === "desc";
          }
        }
      },

      updateQueryParams() {
        const query = new URLSearchParams();

        query.set("q", this.searchText);
        query.set(
          "s",
          `${camelToSnakeCase(this.options.sortBy)}|${this.options.sortDesc ? "desc" : "asc"}`,
        );

        window.history.replaceState(
          null,
          "",
          `${window.location.pathname}?${query}`,
        );
      },

      async loadItems() {
        if (this.isLoading) {
          this.shouldRerun = true;
          return;
        }
        this.isLoading = true;

        const res = await doFetch({
          path: "/api/admin/groups",
          query: {
            q: this.searchText,
            sort: `${camelToSnakeCase(this.options.sortBy)}:${this.options.sortDesc ? "desc" : "asc"}`,
          },
        });

        this.items = res.body.items;
        this.isLoading = false;

        if (this.shouldRerun) {
          this.shouldRerun = false;
          return this.loadItems();
        }
      },

      onOptionsUpdate(options) {
        this.options.sortBy = options.sortBy;
        this.options.sortDesc = options.sortDesc;

        this.updateQueryParams();
        this.loadItems();
      },

      onSearchUpdate(value) {
        this.searchText = value;
        this.updateQueryParams();
        this.loadItems();
      },

      toGroupDetails(groupId) {
        return `/admin/groups/${groupId}`;
      },
    },

    created() {
      this.readQueryParams();
      this.loadItems();
    },

    template: `
      <div class="field is-grouped">
        <div class="control has-icons-left ml-auto">
          <LazyInput class="input" :model-value="searchText" @update:model-value="onSearchUpdate" autofocus></LazyInput>

          <span class="icon is-left">
            <svg width="24" height="24">
              <use xlink:href="#magnify"></use>
            </svg>
          </span>
        </div>
      </div>

      <DataTable
        :headers="headers"
        :value="items"
        :is-loading="isLoading"
        :options="options"
        @update:options="onOptionsUpdate"
      >
        <template #["item.actions"]="{ item }">
          <div class="buttons is-right">
            <a :href="toGroupDetails(item.id)" class="button is-small">
              <span class="icon">
                <svg width="24" height="24">
                  <use xlink:href="#magnify"></use>
                </svg>
              </span>
            </a>
          </div>
        </template>
      </DataTable>
    `,
  };

  createApp({
    components: {
      Toast,
      GroupTable,
    },

    data() {
      return {
        showGroupNotFoundToast: false,
      };
    },

    mounted() {
      const url = new URL(window.location.href);

      if (url.searchParams.has("group_not_found")) {
        this.showGroupNotFoundToast = true;
        url.searchParams.delete("group_not_found");
        window.history.replaceState(null, "", url);
      }
    },

    template: `
      <Toast v-model="showGroupNotFoundToast" class="is-danger"><%= $t("tymber.user.toast.groupNotFound") %></Toast>

      <GroupTable />
    `,
  }).mount("#app");
</script>
