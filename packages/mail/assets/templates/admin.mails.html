<% TITLE = `${CTX.app.name} - ${$t("tymber.mail.mails")}`; %>

<nav class="breadcrumb" aria-label="breadcrumbs">
  <ul>
    <li>
      <a href="/admin" aria-current="page"><%= $t("tymber.common.home") %></a>
    </li>
    <li class="is-active">
      <a href="#" aria-current="page"><%= $t("tymber.mail.mails") %></a>
    </li>
  </ul>
</nav>

<h1 class="title is-spaced"><%= $t("tymber.mail.mails") %></h1>

<div id="app"></div>

<script type="module">
  import { createApp } from "vue";
  import {
    doFetch,
    DataTable,
    snakeToCamelCase,
    camelToSnakeCase,
    Modal,
    LazyInput,
  } from "./utils";

  const Recipients = {
    props: {
      mail: Object,
    },

    emits: ["show"],

    computed: {
      recipients() {
        const recipients = [];
        if (this.mail.to) {
          recipients.push(...this.mail.to);
        }
        if (this.mail.cc) {
          recipients.push(...this.mail.cc);
        }
        if (this.mail.bcc) {
          recipients.push(...this.mail.bcc);
        }
        return recipients;
      },

      label() {
        const recipients = this.recipients;
        if (recipients.length === 0) {
          return "-";
        } else if (recipients.length === 1) {
          return recipients[0].email;
        } else {
          return `${recipients[0].email} (+${recipients.length - 1})`;
        }
      },
    },

    methods: {
      showRecipients() {
        this.$emit("show");
      },
    },

    template: `
      <div class="is-flex is-align-items-center">
        <span>{{ label }}</span>
        <button v-if="recipients.length > 1" class="button is-small ml-3" @click="showRecipients()">
          <span class="icon">
            <svg width="24" height="24">
              <use xlink:href="#magnify"></use>
            </svg>
          </span>
        </button>
      </div>
    `,
  };

  const MailStatus = {
    props: {
      status: Number,
      statusLabels: Array,
    },

    computed: {
      color() {
        switch (this.status) {
          case 0:
          case 1:
            return "";
          case 2:
            return "is-success";
          case 3:
            return "is-danger";
        }
      },
    },

    template: `
      <span class="tag" :class="color">{{ statusLabels[status] }}</span>
    `,
  };

  const RecipientsModal = {
    components: {
      Modal,
    },

    props: {
      modelValue: Boolean,
      mail: Object,
    },

    methods: {
      closeModal() {
        this.$emit("update:model-value", false);
      },
    },

    template: `
      <Modal :model-value="modelValue" @update:model-value="closeModal()">
        <template #header>
          <p class="modal-card-title"><%= $t("tymber.mail.recipients") %></p>
        </template>

        <template #content>
          <div v-if="mail">
            <div v-if="mail.to && mail.to.length > 0">
              <h2><%= $t("tymber.mail.recipients") %></h2>
              <table class="table is-fullwidth">
                <tbody>
                  <tr v-for="recipient of mail.to" :key="recipient.email">
                    <td style="width: 50%">{{ recipient.email }}</td>
                    <td>{{ recipient.name || "-" }}</td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div v-if="mail.cc && mail.cc.length > 0">
              <h2><%= $t("tymber.mail.cc") %></h2>
              <table class="table is-fullwidth">
                <tbody>
                  <tr v-for="recipient of mail.cc" :key="recipient.email">
                    <td style="width: 50%">{{ recipient.email }}</td>
                    <td>{{ recipient.name || "-" }}</td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div v-if="mail.bcc && mail.bcc.length > 0">
              <h2><%= $t("tymber.mail.bcc") %></h2>
              <table class="table is-fullwidth">
                <tbody>
                  <tr v-for="recipient of mail.bcc" :key="recipient.email">
                    <td style="width: 50%">{{ recipient.email }}</td>
                    <td>{{ recipient.name || "-" }}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </template>
      </Modal>
    `,
  };

  const MailTable = {
    components: {
      DataTable,
      LazyInput,
      Recipients,
      RecipientsModal,
      MailStatus,
    },

    props: {
      statusLabels: Array,
    },

    data() {
      return {
        headers: [
          {
            text: "#",
            value: "id",
            isSortable: false,
          },
          {
            text: "<%= $t('tymber.common.createdAt') %>",
            value: "createdAt",
            isSortable: true,
          },
          {
            text: "<%= $t('tymber.mail.subject') %>",
            value: "subject",
          },
          {
            text: "<%= $t('tymber.mail.recipients') %>",
            value: "recipients",
          },
          {
            text: "<%= $t('tymber.mail.status') %>",
            value: "status",
          },
        ],
        isLoading: false,
        shouldRerun: false,
        items: [],
        options: {
          sortBy: "createdAt",
          sortDesc: true,
        },
        showRecipientsModal: false,
        selectedMail: null,
        status: "",
        searchText: "",
      };
    },

    methods: {
      readQueryParams() {
        const query = new URLSearchParams(window.location.search);

        this.status = query.get("st") || "";
        this.searchText = query.get("q") || "";

        const sort = query.get("s");

        if (sort) {
          const parts = sort.split("|");
          const column = snakeToCamelCase(parts[0]);
          if (
            this.headers.some((h) => h.value === column) &&
            ["asc", "desc"].includes(parts[1])
          ) {
            this.options.sortBy = column;
            this.options.sortDesc = parts[1] === "desc";
          }
        }
      },

      updateQueryParams() {
        const query = new URLSearchParams();

        query.set(
          "s",
          `${camelToSnakeCase(this.options.sortBy)}|${this.options.sortDesc ? "desc" : "asc"}`,
        );

        query.set("st", this.status);
        query.set("q", this.searchText);

        window.history.replaceState(
          null,
          "",
          `${window.location.pathname}?${query}`,
        );
      },

      async loadItems() {
        if (this.isLoading) {
          this.shouldRerun = true;
          return;
        }
        this.isLoading = true;

        const query = {
          q: this.searchText,
          sort: `${camelToSnakeCase(this.options.sortBy)}:${this.options.sortDesc ? "desc" : "asc"}`,
        };

        if (this.status) {
          query.status = this.status;
        }

        const res = await doFetch({
          path: "/api/admin/mails",
          query,
        });

        this.items = res.body.items;
        this.isLoading = false;

        if (this.shouldRerun) {
          this.shouldRerun = false;
          return this.loadItems();
        }
      },

      onOptionsUpdate(options) {
        this.options.sortBy = options.sortBy;
        this.options.sortDesc = options.sortDesc;

        this.updateQueryParams();
        this.loadItems();
      },

      showRecipients(mail) {
        this.selectedMail = mail;
        this.showRecipientsModal = true;
      },

      onStatusSelection(event) {
        this.status = event.target.value;
        this.updateQueryParams();
        this.loadItems();
      },

      onSearchUpdate(value) {
        this.searchText = value;
        this.updateQueryParams();
        this.loadItems();
      },
    },

    async created() {
      this.readQueryParams();
      this.loadItems();
    },

    template: `
      <RecipientsModal :mail="selectedMail" v-model="showRecipientsModal" />

      <div class="is-flex">
        <div class="control has-icons-left ml-auto mb-4">
          <div class="select mr-2">
            <select :value="status" @change="onStatusSelection">
              <option value=""><%= $t("tymber.mail.allStatuses") %></option>
              <option v-for="(label, index) in statusLabels" :value="index">{{ label }}</option>
            </select>
          </div>
        </div>

        <div class="control has-icons-left">
          <LazyInput class="input" :model-value="searchText" @update:model-value="onSearchUpdate" autofocus></LazyInput>

          <span class="icon is-left">
            <svg width="24" height="24">
              <use xlink:href="#magnify"></use>
            </svg>
          </span>
        </div>
      </div>

      <DataTable
        :headers="headers"
        :value="items"
        :is-loading="isLoading"
        :options="options"
        @update:options="onOptionsUpdate"
      >
      <template #["item.createdAt"]="{ value }">
          {{ value ? new Date(value).toLocaleString() : '-' }}
        </template>

        <template #["item.recipients"]="{ item }">
          <Recipients :mail="item" @show="showRecipients(item)" />
        </template>

        <template #["item.status"]="{ value }">
          <MailStatus :status="value" :status-labels="statusLabels" />
        </template>
      </DataTable>
    `,
  };

  createApp({
    components: {
      MailTable,
    },

    data() {
      return {
        statusLabels: [
          "<%= $t('tymber.mail.statusLabels.0') %>",
          "<%= $t('tymber.mail.statusLabels.1') %>",
          "<%= $t('tymber.mail.statusLabels.2') %>",
          "<%= $t('tymber.mail.statusLabels.3') %>",
        ],
      };
    },

    template: `
      <MailTable :status-labels="statusLabels" />
    `,
  }).mount("#app");
</script>
